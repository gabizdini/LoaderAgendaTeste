<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loader Agenda Fácil | Teste</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  overflow: hidden;
  font-family: 'Quicksand', 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
}

/* Loader principal */
#loader {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: linear-gradient(145deg, #fef9f0 0%, #fff5e6 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 1000;
}

/* Container dos elementos */
.loader-content {
  text-align: center;
  padding: 2rem;
  max-width: 400px;
}

/* Agenda/calendário animado */
.agenda-icon {
  position: relative;
  width: 180px;
  height: 180px;
  margin: 0 auto 1.5rem;
  animation: floatAgenda 2s ease-in-out infinite;
}

@keyframes floatAgenda {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-10px) rotate(2deg); }
}

.calendar-base {
  width: 100%;
  height: 100%;
  background: white;
  border-radius: 20px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.1);
  position: relative;
  overflow: hidden;
}

.calendar-header {
  background: linear-gradient(135deg, #f0935e, #f5a65a);
  height: 35%;
  width: 100%;
  position: relative;
}

.calendar-header::before {
  content: "📅";
  position: absolute;
  bottom: 8px;
  left: 12px;
  font-size: 1.3rem;
}

.calendar-days {
  padding: 4px 10px;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  font-size: 0.55rem;
  color: #888;
  font-weight: 600;
}

.calendar-numbers {
  padding: 0 8px 8px 8px;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  font-size: 0.55rem;
  color: #555;
}

.calendar-numbers span {
  text-align: center;
  padding: 2px;
}

.calendar-numbers span.today {
  background: #f5a65a;
  color: white;
  border-radius: 50%;
  width: 15px;
  height: 15px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto;
}

/* Subtítulo */
.subtitle {
  font-size: 0.85rem;
  color: #c47a44;
  margin-top: 0.5rem;
  opacity: 0.7;
  font-weight: 500;
}

/* Container dos pontinhos */
.dot-container {
  display: inline-flex;
  gap: 6px;
  margin-left: 5px;
}

.dot {
  width: 8px;
  height: 8px;
  background: #f5a65a;
  border-radius: 50%;
  animation: wave 1.4s ease-in-out infinite;
}

.dot:nth-child(2) { animation-delay: 0.2s; background: #f0935e; }
.dot:nth-child(3) { animation-delay: 0.4s; background: #ffb347; }

@keyframes wave {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-12px); opacity: 1; }
}

@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

.reload-test-btn:hover {
  transform: scale(1.03);
  box-shadow: 0 6px 16px rgba(240, 147, 94, 0.3);
}

/* Responsivo */
@media (max-width: 600px) {
  .agenda-icon { width: 90px; height: 90px; }
  .loader-text { font-size: 1.3rem; }
  .progress-wrapper { width: 240px; }
  .message { font-size: 0.75rem; }
}
</style>
</head>
<body>

<div id="loader">
  <div class="loader-content">
    <!-- Agenda animada -->
    <div class="agenda-icon">
      <div class="calendar-base">
        <div class="calendar-header"></div>
        <div class="calendar-days">
          <span>D</span><span>S</span><span>T</span><span>Q</span><span>Q</span><span>S</span><span>S</span>
        </div>
        <div class="calendar-numbers">
          <span></span><span></span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
          <span>6</span><span>7</span><span>8</span><span>9</span><span>10</span><span>11</span><span>12</span>
          <span>13</span><span>14</span><span>15</span><span class="today">16</span><span>17</span><span>18</span><span>19</span>
          <span>20</span><span>21</span><span>22</span><span>23</span><span>24</span><span>25</span><span>26</span><span>27</span>
          <span>28</span><span>29</span><span>30</span><span>31</span>
        </div>
      </div>
    </div>
      <div class="dot-container">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    <div class="subtitle">sua organização com carinho</div>
    
    <div class="progress-wrapper">
      <div class="progress-bar-bg">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
  </div>
</div>

<script>
</script>
</body>
</html>
